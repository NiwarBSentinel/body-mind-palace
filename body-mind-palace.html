<style>

#bmp-app .bmp-body{max-width:1400px;margin:0 auto;padding:24px 32px 0;}

#bmp-app .person-bar{

  border-radius:8px;

#bmp-app .person-field label{

}

#bmp-app .exp-btn:hover{background:rgba(160,120,64,0.12);border-color:#a07840;}

/* ── Person Chips ── */

#bmp-app .person-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}

#bmp-app .pchip{

  border:1px solid rgba(0,0,0,0.12);

  border-radius:20px;

  color:#857e79;

  font-size:12px;

  font-family:system-ui,sans-serif;

  cursor:pointer;

  transition:all 0.2s;

}

#bmp-app .pchip:hover,

#bmp-app .pchip.active{

  background:rgba(160,120,64,0.15);

  border-color:#a07840;

  color:#a07840;

}

/* ── Room Tabs ── */

#bmp-app .room-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}

#bmp-app .rtab{

  padding:8px 16px;

  background:#ffffff;

  border:1px solid rgba(0,0,0,0.10);

  border-radius:6px;

  color:#857e79;

  font-size:12px;

  font-family:system-ui,sans-serif;

  cursor:pointer;

  transition:all 0.2s;

  display:flex;flex-direction:column;align-items:center;

}

#bmp-app .rtab:hover{border-color:rgba(160,120,64,0.45);color:#1a1917;}

#bmp-app .rtab.on{

  background:rgba(160,120,64,0.12);

  border-color:#a07840;

  color:#a07840;

}

#bmp-app .rtab-name{font-weight:600;font-size:12px;}

#bmp-app .rtab-body{font-size:10px;opacity:0.7;font-style:italic;}

/* ── Layout ── */

#bmp-app .layout{

  display:grid;

  grid-template-columns:320px 1fr;

  gap:20px;

  align-items:start;

}

@media(max-width:860px){

  #bmp-app .layout{grid-template-columns:1fr;}

}

/* ── Loci Column ── */

#bmp-app .loci-col{display:flex;flex-direction:column;gap:5px;}

#bmp-app .lc{

  align-items:center;

  gap:11px;

  padding:9px 13px;

  background:#ffffff;

  border:1px solid rgba(0,0,0,0.08);

  border-radius:6px;

  cursor:pointer;

  transition:all 0.18s;

}

#bmp-app .lc:hover{background:#f0eeea;border-color:rgba(160,120,64,0.30);}

#bmp-app .lc.sel{

  background:rgba(160,120,64,0.10);

  border-color:rgba(160,120,64,0.55);

}

#bmp-app .lc-num{

  width:26px;height:26px;

  border-radius:50%;

  display:flex;align-items:center;justify-content:center;

  font-size:11px;font-weight:700;

  font-family:system-ui,sans-serif;

  flex-shrink:0;

}

#bmp-app .lc-info{flex:1;min-width:0;}

#bmp-app .lc-name{

  font-size:13px;font-weight:600;

  color:#1a1917;margin:0 0 2px;

  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;

  font-family:system-ui,sans-serif;

}

#bmp-app .lc-pos{font-size:11px;color:#6b6560;font-style:italic;font-family:Lora,Georgia,serif;}

/* ── Detail Panel ── */

#bmp-app .detail-panel{

  background:#ffffff;

  border:1px solid rgba(0,0,0,0.10);

  border-radius:8px;

  overflow:hidden;

  position:sticky;top:80px;

  min-height:300px;

}

/* Image zone (built by JS inside detail-panel) */

#bmp-app .img-zone{

  width:100%;

  position:relative;

  background:#f5f4f0;

  border-bottom:1px solid rgba(0,0,0,0.08);

}

#bmp-app .img-zone img{

  width:100%;

  height:auto;

  display:block;

}

#bmp-app .img-msg{

  padding:40px;text-align:center;

  color:#6b6560;font-style:italic;font-size:13px;

  font-family:Lora,Georgia,serif;

}

#bmp-app .next-btn{

  position:absolute;bottom:8px;right:8px;

  padding:5px 12px;

  background:rgba(255,255,255,0.85);

  border:1px solid rgba(0,0,0,0.15);

  border-radius:4px;

  color:#1a1917;font-size:11px;

  font-family:system-ui,sans-serif;

  cursor:pointer;

}

#bmp-app .img-src{display:none;}

/* det-body (content filled by JS) */

#bmp-app .det-body{padding:24px 28px;}

#bmp-app .det-name{

  font-family:Gloock,Georgia,serif;

  font-size:21px;font-weight:400;

  color:#1a1917;margin:0 0 4px;

}

#bmp-app .det-pos{

  font-size:12px;color:#6b6560;

  font-style:italic;margin:0 0 14px;

  font-family:Lora,Georgia,serif;

}

#bmp-app .sense-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}

#bmp-app .stag{

  padding:3px 10px;

  background:rgba(0,0,0,0.06);

  border:1px solid rgba(0,0,0,0.12);

  border-radius:12px;

  font-size:11px;color:#857e79;

  font-family:system-ui,sans-serif;

}

#bmp-app .det-anchor{font-size:14px;color:#1a1917;margin-bottom:12px;line-height:1.6;}

#bmp-app .det-transform{

  font-size:13px;color:#857e79;

  padding:12px 14px;

  background:rgba(160,120,64,0.08);

  border:1px solid rgba(160,120,64,0.20);

  border-radius:6px;margin-bottom:14px;line-height:1.6;

}

#bmp-app .tl{

  display:block;font-size:10px;font-weight:700;

  letter-spacing:0.1em;text-transform:uppercase;

  color:#a07840;margin-bottom:5px;font-family:system-ui,sans-serif;

}

/* Note section (built by JS) */

#bmp-app .note-section{margin-top:14px;}

#bmp-app .note-section label{

  display:block;font-size:10px;font-weight:700;

  letter-spacing:0.1em;text-transform:uppercase;

  color:#6b6560;margin-bottom:6px;font-family:system-ui,sans-serif;

}

#bmp-app .note-field{

  width:100%;min-height:72px;

  background:#f0eeea;

  border:1px solid rgba(0,0,0,0.12);

  border-radius:5px;

  padding:9px 12px;

  color:#1a1917;font-size:13px;

  font-family:Lora,Georgia,serif;

  resize:vertical;outline:none;

  transition:border-color 0.2s;

}

#bmp-app .note-field:focus{border-color:#a07840;}

#bmp-app .note-save-btn{

  margin-top:7px;padding:6px 14px;

  background:transparent;

  border:1px solid rgba(160,120,64,0.45);

  border-radius:5px;color:#a07840;

  font-size:12px;font-family:system-ui,sans-serif;

  cursor:pointer;transition:all 0.2s;

}

#bmp-app .note-save-btn:hover{background:rgba(160,120,64,0.12);}

#bmp-app #noteSaved{

  font-size:11px;color:#a07840;

  margin-left:10px;display:none;

  font-family:system-ui,sans-serif;

}

/* Room Map */

#bmp-app .room-map{

  margin-top:16px;padding:16px;

  background:#f5f4f0;

  border-top:1px solid rgba(0,0,0,0.06);

}

#bmp-app .room-map-title{

  font-size:10px;font-weight:700;

  letter-spacing:0.1em;text-transform:uppercase;

  color:#6b6560;margin-bottom:10px;

  font-family:system-ui,sans-serif;

}

#bmp-app .map-canvas{

  position:relative;width:100%;height:200px;

  background:#ffffff;

  border:1px solid rgba(0,0,0,0.08);

  border-radius:6px;overflow:hidden;

}

#bmp-app .map-node{

  position:absolute;

  transform:translate(-50%,-50%);

  cursor:pointer;

  text-align:center;

}

#bmp-app .map-node-circle{

  width:32px;height:32px;

  border-radius:50%;

  background:rgba(0,0,0,0.08);

  border:1px solid rgba(0,0,0,0.15);

  display:flex;align-items:center;justify-content:center;

  font-size:11px;font-weight:700;

  color:#857e79;margin:0 auto;

  font-family:system-ui,sans-serif;

}

#bmp-app .map-node.active .map-node-circle{

}

#bmp-app .map-node-label{

  font-size:9px;color:#6b6560;

  font-family:system-ui,sans-serif;

/* Image Edit Overlay */

#bmp-app #imgEditOverlay{

  display:none;position:fixed;inset:0;

}

#bmp-app #imgEditOverlay.open{display:flex;}

#bmp-app .img-edit-modal{

  background:#f0eeea;

  border:1px solid rgba(0,0,0,0.12);

}

#bmp-app .img-edit-modal h3{

  font-family:Gloock,Georgia,serif;

  font-size:18px;font-weight:400;

  color:#1a1917;margin:0 0 14px;

}

#bmp-app #imgEditTitle{font-size:12px;color:#6b6560;margin-bottom:10px;font-style:italic;}

#bmp-app #imgEditUrl{

  width:100%;background:#ffffff;

  border:1px solid rgba(0,0,0,0.12);

  border-radius:5px;padding:9px 12px;

  color:#1a1917;font-size:13px;

  font-family:Lora,Georgia,serif;

  outline:none;margin-bottom:12px;

}

#bmp-app #imgEditUrl:focus{border-color:#a07840;}

#bmp-app .img-edit-btns{display:flex;gap:10px;}

#bmp-app .img-edit-btns button{

  flex:1;padding:8px;border-radius:5px;

  font-size:13px;font-family:system-ui,sans-serif;cursor:pointer;transition:all 0.2s;

}

#bmp-app .btn-save-img{

  background:rgba(160,120,64,0.20);

  border:1px solid #a07840;color:#a07840;

}

#bmp-app .btn-save-img:hover{background:rgba(160,120,64,0.30);}

#bmp-app .btn-cancel-img{

  background:transparent;

  border:1px solid rgba(0,0,0,0.14);color:#857e79;

}

#bmp-app .btn-cancel-img:hover{border-color:rgba(0,0,0,0.20);color:#1a1917;}

</style>

const DATA_KEY='bodypalace_data';

let currentPerson='Standard';

let bpData={};

function bpLoad(){try{bpData=JSON.parse(localStorage.getItem(DATA_KEY)||'{}');}catch(e){bpData={};}}

function bpSave(){localStorage.setItem(DATA_KEY,JSON.stringify(bpData));}

function bpEnsure(p){if(!bpData[p])bpData[p]={thema:'',loci:{}};}

function bpGetNote(r,l){bpEnsure(currentPerson);return(bpData[currentPerson].loci[r+'_'+l]||{}).note||'';}

function bpSetNote(r,l,v){bpEnsure(currentPerson);if(!bpData[currentPerson].loci[r+'_'+l])bpData[currentPerson].loci[r+'_'+l]={};bpData[currentPerson].loci[r+'_'+l].note=v;bpSave();}

function switchPerson(name){

  const n=(name||'').trim()||'Standard';

  currentPerson=n;

  bpLoad();bpEnsure(n);

  const pi=document.getElementById('personInput');

  const ti=document.getElementById('themaInput');

  if(pi&&pi.value!==n)pi.value=n;

  if(ti)ti.value=bpData[n].thema||'';

  renderChips();renderLoci();renderDetail();

}

function saveThema(){

  const ti=document.getElementById('themaInput');

  if(!ti)return;

  bpEnsure(currentPerson);

  bpData[currentPerson].thema=ti.value.trim();

  bpSave();renderChips();

}

function renderChips(){

  const el=document.getElementById('personChips');

  if(!el)return;

  const ps=Object.keys(bpData);

  if(ps.length===0){el.innerHTML='';return;}

  el.innerHTML=ps.map(function(p){

    const t=bpData[p].thema?(' &mdash; '+bpData[p].thema):'';

    return '<button class="pchip'+(p===currentPerson?' active':'')

      +'" onclick="switchPerson('+JSON.stringify(p)+')">'+p+t+'</button>';

  }).join('');

}

function saveNote(){

  const nf=document.getElementById('noteField');

  if(!nf)return;

  bpSetNote(activeRoom,activeLocus,nf.value);

  const ns=document.getElementById('noteSaved');

  if(ns){ns.classList.add('show');setTimeout(function(){ns.classList.remove('show');},1800);}

}

function loadNoteIntoField(){

  const nf=document.getElementById('noteField');

  if(nf)nf.value=bpGetNote(activeRoom,activeLocus);

}

function buildExportText(personName){

  const pd=bpData[personName]||{thema:'',loci:{}};

  const lines=['Body Mind Palace Export','Person: '+personName];

  if(pd.thema)lines.push('Thema: '+pd.thema);

  lines.push('Datum: '+new Date().toLocaleDateString('de-CH'),'');

  rooms.forEach(function(room,ri){

    lines.push('=== '+room.name+' ('+room.body+') ===');

    room.loci.forEach(function(locus,li){

      const ld=(pd.loci[ri+'_'+li])||{};

      lines.push((li+1)+'. '+locus.n,'   Notiz: '+(ld.note||'-'));

    });

    lines.push('');

  });

  return lines.join('%0A');

}

function exportPerson(){

  const txt=buildExportText(currentPerson);

  const sub=encodeURIComponent('Body Mind Palace Export - '+currentPerson);

  window.open('mailto:?subject='+sub+'&body='+txt,'_self');

}

function exportAll(){

  const ps=Object.keys(bpData);

  const all=ps.map(buildExportText).join('%0A%0A----%0A%0A');

  const sub=encodeURIComponent('Body Mind Palace Export - Alle Personen');

  window.open('mailto:?subject='+sub+'&body='+all,'_self');

}

function locusKey(r,l){ return 'bmp_img_'+r+'_'+l; }

function showImage(roomIdx,locusIdx){

  const img=document.getElementById('locusImg');

  const msg=document.getElementById('imgMsg');

  const editBtn=document.getElementById('editImgBtn');

  const srcDiv=document.getElementById('imgSrc');

  const key=roomIdx+'_'+locusIdx;

  const url=locusImages[key]||localStorage.getItem('bmp_img_'+key);

  if(img) img.style.display='none';

  if(msg) msg.style.display='none';

  if(srcDiv) srcDiv.innerHTML='';

  if(editBtn) editBtn.style.display='inline-block';

  if(url){

    if(img){

      img.src=url;

      img.style.display='block';

      img.onerror=()=>{

        img.style.display='none';

        if(msg){msg.textContent='Bild konnte nicht geladen werden.';msg.style.display='block';}

      };

    }

  } else {

    if(msg){msg.textContent='Kein Bild gespeichert.';msg.style.display='block';}

  }

}

function openImgEdit(){

  const lName=rooms[activeRoom].loci[activeLocus].n;

  document.getElementById('imgEditTitle').textContent='Bild für: '+lName;

  document.getElementById('imgEditUrl').value=localStorage.getItem(locusKey(activeRoom,activeLocus))||'';

  document.getElementById('imgEditOverlay').style.display='flex';

}

function saveImgEdit(){

  const url=document.getElementById('imgEditUrl').value.trim();

  const key=locusKey(activeRoom,activeLocus);

  if(url) localStorage.setItem(key,url);

  else localStorage.removeItem(key);

  document.getElementById('imgEditOverlay').style.display='none';

  showImage(activeRoom,activeLocus);

}

function closeImgEdit(){

  document.getElementById('imgEditOverlay').style.display='none';

}

const MAP_POS=[

  [50,82], // locus 0: Eingang — bottom center

  [18,52], // locus 1: Linke Wand — mid left

  [18,18], // locus 2: Linke Ecke hinten — top left

  [82,18], // locus 3: Rechte Ecke hinten — top right

  [82,52]  // locus 4: Rechte Wand — mid right

];

const NODE_COLORS=["#378ADD","#D4537E","#639922","#EF9F27","#9B59B6"];

function renderMap(roomIdx, activeLoci){

  const map=document.getElementById('roomMap');

  if(!map) return;

  const room=rooms[roomIdx];

  if(!room){map.style.display='none';return;}

  map.style.display='block';

  // Build SVG lines

  const pts=MAP_POS;

  let lines='';

  for(let i=0;i<pts.length;i++){

    const j=(i+1)%pts.length;

    lines+=`<line x1="${pts[i][0]}%" y1="${pts[i][1]}%" x2="${pts[j][0]}%" y2="${pts[j][1]}%" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 3"/>`;

  }

  // Build nodes HTML

  let nodes='';

  for(let i=0;i<room.loci.length;i++){

    const l=room.loci[i];

    const [px,py]=pts[i];

    const color=NODE_COLORS[i];

    const isActive=(i===activeLoci);

    const activeClass=isActive?' active':'';

    nodes+=`<div class="map-node${activeClass}" style="left:${px}%;top:${py}%;position:absolute;transform:translate(-50%,-50%)" onclick="selectLocus(${i})">

      <div class="map-node-circle" style="border-color:${color};color:${color}${isActive?';background:'+color+';color:#fff':''}">${i+1}</div>

      <div class="map-node-label" title="${l.n}">${l.n.length>12?l.n.slice(0,11)+'…':l.n}</div>

    </div>`;

  }

  map.innerHTML=`

    <div class="room-map-title">${room.name} &mdash; ${room.body}</div>

    <div class="map-canvas" id="mapCanvas">

      <svg>${lines}</svg>

      ${nodes}

    </div>`;

}

function renderDetail(){

  renderMap(activeRoom, activeLocus);

  const l=rooms[activeRoom].loci[activeLocus];

  const stags=l.senses.map(s=>`<span class="stag" style="border-color:${SC[s]}55;color:${SC[s]};background:${SC[s]}11">${s}</span>`).join('');

  document.getElementById('detBody').innerHTML=`

    <div class="det-name">${l.n}</div>

    <div class="det-pos">${POS[activeLocus]} — ${POSDIR[activeLocus]}</div>

    <div class="sense-row">${stags}</div>

    <div class="det-anchor">${l.anchor}</div>

    <div class="det-transform"><span class="tl">Person-Transformation</span>${l.transform}</div><div class="note-section"><label>Meine Notiz</label><textarea class="note-field" id="noteField" placeholder="Was habe ich hier gelernt..." onblur="saveNote()"></textarea><div class="note-saved" id="noteSaved">Gespeichert</div></div>`;

  showImage(activeRoom,activeLocus);loadNoteIntoField();

}

function renderLoci(){

  const ll=document.getElementById('lociList');

  ll.innerHTML='';

  rooms[activeRoom].loci.forEach((l,i)=>{

    const div=document.createElement('div');

    div.className='lc'+(i===activeLocus?' sel':'');

    div.innerHTML=`<div class="lc-num" style="background:${COLS[i]}22;color:${COLS[i]};border:0.5px solid ${COLS[i]}55">${i+1}</div>

      <div class="lc-info"><div class="lc-name">${l.n}</div><div class="lc-pos">${POS[i]}</div></div>`;

    div.onclick=()=>{activeLocus=i;renderLoci();renderDetail();};

    ll.appendChild(div);

  });

}

function renderTabs(){

  const t=document.getElementById('tabs');

  t.innerHTML='';

  rooms.forEach((r,i)=>{

    const b=document.createElement('button');

    b.className='rtab'+(i===activeRoom?' on':'');

    b.innerHTML='<span class="rtab-name">'+r.name+'</span><span class="rtab-body">'+r.body+'</span>';

    b.onclick=()=>{activeRoom=i;activeLocus=0;bpLoad();bpEnsure(currentPerson);renderChips();renderTabs();renderLoci();renderDetail();};

    t.appendChild(b);

  });

}

renderTabs();

renderLoci();

  urlInput.style.cssText='width:100%;background:#ffffff;border:1px solid rgba(0,0,0,0.12);border-radius:5px;padding:9px 12px;color:#1a1917;font-size:13px;font-family:Lora,Georgia,serif;outline:none;margin-bottom:12px;box-sizing:border-box;';

  urlInput.addEventListener('focus',function(){this.style.borderColor='#a07840';});

  urlInput.addEventListener('blur',function(){this.style.borderColor='rgba(0,0,0,0.12)';});

  

  var btnRow=document.createElement('div');

  btnRow.style.cssText='display:flex;gap:10px;';

  

  var btnSave=document.createElement('button');

  btnSave.textContent='Speichern';

  btnSave.onclick=saveImgEdit;

  btnSave.style.cssText='flex:1;padding:8px;border-radius:5px;font-size:13px;font-family:system-ui,sans-serif;cursor:pointer;background:rgba(160,120,64,0.20);border:1px solid #a07840;color:#a07840;';

  

  var btnCancel=document.createElement('button');

  btnCancel.textContent='Abbrechen';

  btnCancel.onclick=closeImgEdit;

  btnCancel.style.cssText='flex:1;padding:8px;border-radius:5px;font-size:13px;font-family:system-ui,sans-serif;cursor:pointer;background:transparent;border:1px solid rgba(0,0,0,0.14);color:#857e79;';

  

  btnRow.appendChild(btnSave);

  btnRow.appendChild(btnCancel);

  modal.appendChild(h3);

  modal.appendChild(titleDiv);

  modal.appendChild(urlInput);

  modal.appendChild(btnRow);

  ov.appendChild(modal);

  document.body.appendChild(ov);

})();

</script>
