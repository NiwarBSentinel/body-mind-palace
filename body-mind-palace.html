<style>

/* ── Room Tabs ── */
#bmp-app .room-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
#bmp-app .rtab{

#bmp-app .layout{

}

#bmp-app .lc-name{

#bmp-app .lc-score{

// ── DATA LAYER ──
var DATA_KEY='bodypalace_data';
var currentPerson='Standard';
var bpData={};

function bpLoad(){try{bpData=JSON.parse(localStorage.getItem(DATA_KEY)||'{}');}catch(e){bpData={};}}
function bpSave(){localStorage.setItem(DATA_KEY,JSON.stringify(bpData));}
function bpEnsure(p){if(!bpData[p])bpData[p]={thema:'',loci:{}};}
function bpGetLocus(r,l){bpEnsure(currentPerson);return bpData[currentPerson].loci[r+'_'+l]||{};}
function bpSetLocus(r,l,fields){
  bpEnsure(currentPerson);
  const key=r+'_'+l;
  if(!bpData[currentPerson].loci[key])bpData[currentPerson].loci[key]={};
  Object.assign(bpData[currentPerson].loci[key],fields);
  bpSave();
}
function bpGetNote(r,l){return bpGetLocus(r,l).note||'';}
function bpSetNote(r,l,v){bpSetLocus(r,l,{note:v});}
function bpGetScore(r,l){return bpGetLocus(r,l).score||0;}
function bpSetScore(r,l,s){bpSetLocus(r,l,{score:s,lastDrill:Date.now()});}

// ── SCORE COLORS ──
function scoreColor(s){
  if(!s)return '#ccc';
  if(s<=1)return '#e05555';
  if(s<=2)return '#e08030';
  if(s<=3)return '#c8b020';
  if(s<=4)return '#60b030';
  return '#1da070';
}
function scoreLabel(s){
  if(!s)return '—';
  return ['','✗','△','◇','✓','★'][s]||s;
}

// ── PERSON MANAGEMENT ──
function switchPerson(name){
  const n=(name||'').trim()||'Standard';
  currentPerson=n;
  bpLoad();bpEnsure(n);
  const pi=document.getElementById('personInput');
  const ti=document.getElementById('themaInput');
  if(pi&&pi.value!==n)pi.value=n;
  if(ti)ti.value=bpData[n].thema||'';
  renderChips();renderTabs();renderLoci();renderDetail();updateDrillStats();
}
function saveThema(){
  const ti=document.getElementById('themaInput');
  if(!ti)return;
  bpEnsure(currentPerson);
  bpData[currentPerson].thema=ti.value.trim();
  bpSave();renderChips();
}
function renderChips(){
  const el=document.getElementById('personChips');
  if(!el)return;
  const ps=Object.keys(bpData);
  if(!ps.length){el.innerHTML='';return;}
  el.innerHTML=ps.map(p=>{
    const t=bpData[p].thema?(' &mdash; '+bpData[p].thema):'';
    return '<button class="pchip'+(p===currentPerson?' active':'')+'" onclick="switchPerson('+JSON.stringify(p)+')">'+p+t+'</button>';
  }).join('');
}

// ── NOTE ──
function saveNote(){
  const nf=document.getElementById('noteField');
  if(!nf)return;
  bpSetNote(activeRoom,activeLocus,nf.value);
  const ns=document.getElementById('noteSaved');

// ── DRILL STATS (main view) ──
function updateDrillStats(){
  const el=document.getElementById('drillStats');
  if(!el)return;
  let total=0,scored=0,sum=0,mastered=0;
  rooms.forEach((room,ri)=>{
    room.loci.forEach((_,li)=>{
      total++;
      const s=bpGetScore(ri,li);
      if(s){scored++;sum+=s;if(s>=4)mastered++;}
    });
  });
  if(!scored){el.style.display='none';return;}
  el.style.display='flex';
  const avg=scored?(sum/scored).toFixed(1):'—';
  el.innerHTML=
    '<div class="drill-stat"><div class="drill-stat-val">'+scored+'/'+total+'</div><div class="drill-stat-lbl">Geübt</div></div>'+
    '<div class="drill-stat"><div class="drill-stat-val">'+avg+'</div><div class="drill-stat-lbl">Ø Score</div></div>'+
    '<div class="drill-stat"><div class="drill-stat-val" style="color:#1da070">'+mastered+'</div><div class="drill-stat-lbl">Gemeistert</div></div>'+
    '<div class="drill-stat"><div class="drill-stat-val" style="color:#e05555">'+(total-mastered)+'</div><div class="drill-stat-lbl">Noch offen</div></div>';
}

// ── EXPORT / IMPORT ──
function exportJSON(){
  bpLoad();
  const blob=new Blob([JSON.stringify(bpData,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='body-mind-palace-'+currentPerson+'-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function openImport(){
  document.getElementById('importOverlay').style.display='flex';
}
function closeImport(){
  document.getElementById('importOverlay').style.display='none';
}
function handleImportFile(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      Object.assign(bpData,imported);
      bpSave();
      closeImport();
      renderChips();renderTabs();renderLoci();renderDetail();updateDrillStats();
      alert('Import erfolgreich! '+Object.keys(imported).length+' Person(en) importiert.');
    }catch(err){alert('Fehler beim Import: '+err.message);}
  };
  reader.readAsText(file);
}
function exportPerson(){
  const pd=bpData[currentPerson]||{thema:'',loci:{}};
  const lines=['Body Mind Palace Export','Person: '+currentPerson];
  if(pd.thema)lines.push('Thema: '+pd.thema);
  lines.push('Datum: '+new Date().toLocaleDateString('de-CH'),'');
  rooms.forEach((room,ri)=>{
    lines.push('=== '+room.name+' ('+room.body+') ===');
    room.loci.forEach((locus,li)=>{
      const ld=pd.loci[ri+'_'+li]||{};
      lines.push((li+1)+'. '+locus.n,'   Score: '+(ld.score||'—'),'   Notiz: '+(ld.note||'-'));
    });
    lines.push('');
  });
  const sub=encodeURIComponent('Body Mind Palace Export - '+currentPerson);
  window.open('mailto:?subject='+sub+'&body='+lines.join('%0A'),'_self');
}

// ── ROOM MAP ──
var MAP_POS=[[50,82],[18,52],[18,18],[82,18],[82,52]];
var NODE_COLORS=["#378ADD","#D4537E","#639922","#EF9F27","#9B59B6"];
function renderMap(roomIdx,activeLoci){
  const map=document.getElementById('roomMap');
  if(!map)return;
  const room=rooms[roomIdx];
  if(!room)return;
  const pts=MAP_POS;
  let lines='';
  for(let i=0;i<pts.length;i++){
    const j=(i+1)%pts.length;
    lines+=`<line x1="${pts[i][0]}%" y1="${pts[i][1]}%" x2="${pts[j][0]}%" y2="${pts[j][1]}%" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  }
  let nodes='';
  for(let i=0;i<room.loci.length;i++){
    const l=room.loci[i];
    const [px,py]=pts[i];
    const color=NODE_COLORS[i];
    const isActive=(i===activeLoci);
    nodes+=`<div class="map-node${isActive?' active':''}" style="left:${px}%;top:${py}%;position:absolute;transform:translate(-50%,-50%)" onclick="selectLocus(${i})">
      <div class="map-node-circle" style="border-color:${color};color:${color}${isActive?';background:'+color+';color:#fff':''}">${i+1}</div>
      <div class="map-node-label">${l.n.length>12?l.n.slice(0,11)+'…':l.n}</div>
    </div>`;
  }
  map.innerHTML=`<svg style="position:absolute;inset:0;width:100%;height:100%">${lines}</svg>${nodes}`;
}

// ── RENDER DETAIL ──
function renderDetail(){
  renderMap(activeRoom,activeLocus);
  const l=rooms[activeRoom].loci[activeLocus];
  const stags=l.senses.map(s=>`<span class="stag" style="border-color:${SC[s]}55;color:${SC[s]};background:${SC[s]}11">${s}</span>`).join('');
  const score=bpGetScore(activeRoom,activeLocus);
  const scoreHtml=score?`<span style="margin-left:10px;font-size:13px;font-weight:700;color:${scoreColor(score)}">${scoreLabel(score)} Score ${score}/5</span>`:'';
  document.getElementById('detBody').innerHTML=`
    <div class="det-name">${l.n}${scoreHtml}</div>
    <div class="det-pos">${POS[activeLocus]} — ${POSDIR[activeLocus]}</div>
    <div class="sense-row">${stags}</div>
    <div class="det-anchor">${l.anchor}</div>
    <div class="det-transform"><span class="tl">Person-Transformation</span>${l.transform}</div>
    <div class="note-section"><label>Meine Notiz</label>
    <textarea class="note-field" id="noteField" placeholder="Was habe ich hier gelernt..." onblur="saveNote()"></textarea>
    <span class="note-saved" id="noteSaved">Gespeichert</span></div>`;
  showImage(activeRoom,activeLocus);
  loadNoteIntoField();
}

// ── RENDER LOCI ──
function renderLoci(){
  const ll=document.getElementById('lociList');
  ll.innerHTML='';
  rooms[activeRoom].loci.forEach((l,i)=>{
    const score=bpGetScore(activeRoom,i);
    const div=document.createElement('div');
    div.className='lc'+(i===activeLocus?' sel':'');
    const bar=score?`<div class="lc-progress-bar" style="width:${score*20}%;background:${scoreColor(score)}"></div>`:'';
    div.innerHTML=`${bar}
      <div class="lc-num" style="background:${COLS[i]}22;color:${COLS[i]};border:0.5px solid ${COLS[i]}55">${i+1}</div>
      <div class="lc-info"><div class="lc-name">${l.n}</div><div class="lc-pos">${POS[i]}</div></div>
      <div class="lc-score" style="color:${scoreColor(score)}">${scoreLabel(score)}</div>`;
    div.onclick=()=>{activeLocus=i;renderLoci();renderDetail();};
    ll.appendChild(div);
  });
}

// ── RENDER TABS ──
function renderTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML='';
  rooms.forEach((r,i)=>{
    // calc room progress
    let total=r.loci.length,mastered=0;
    r.loci.forEach((_,li)=>{if(bpGetScore(i,li)>=4)mastered++;});
    const pct=Math.round(mastered/total*100);
    const b=document.createElement('button');
    b.className='rtab'+(i===activeRoom?' on':'');
    b.innerHTML=`<span class="rtab-name">${r.name}</span><span class="rtab-body">${r.body}</span>
      <div class="rtab-progress"><div class="rtab-progress-fill" style="width:${pct}%"></div></div>`;
    b.onclick=()=>{activeRoom=i;activeLocus=0;bpLoad();bpEnsure(currentPerson);renderChips();renderTabs();renderLoci();renderDetail();};
    t.appendChild(b);
  });
}

function selectLocus(i){activeLocus=i;renderLoci();renderDetail();}

// ── STATE ──────────────────────────────────────────────────────
var activeRoom=0, activeLocus=0;
var DATA_KEY='bodypalace_data';
var currentPerson='Standard';
var bpData={};

function bpLoad(){try{bpData=JSON.parse(localStorage.getItem(DATA_KEY)||'{}');}catch(e){bpData={};}}
function bpSave(){localStorage.setItem(DATA_KEY,JSON.stringify(bpData));}
function bpEnsure(p){if(!bpData[p])bpData[p]={thema:'',loci:{}};}
function bpGetLocus(r,l){bpEnsure(currentPerson);return bpData[currentPerson].loci[r+'_'+l]||{};}
function bpSetLocus(r,l,obj){bpEnsure(currentPerson);bpData[currentPerson].loci[r+'_'+l]=Object.assign(bpGetLocus(r,l),obj);bpSave();}
function bpGetNote(r,l){return bpGetLocus(r,l).note||'';}
function bpGetScore(r,l){return bpGetLocus(r,l).score||0;}

// ── SCORE COLOURS ──────────────────────────────────────────────
function scoreColor(s){
  if(!s)return '#ccc';
  return['','#e05555','#e08030','#c8b020','#60b030','#1da070'][s]||'#ccc';
}
function scoreLabel(s){
  return['—','Nochmal','Schwach','Ok','Gut','Super!'][s]||'—';
}

// ── DRILL MODE ──
var drillQueue=[], drillIdx=0, drillRevealed=false;

function buildDrillQueue(){
  // Sort by score ascending (weakest first), unscored first
  const items=[];
  rooms.forEach((room,ri)=>{
    room.loci.forEach((_,li)=>{
      items.push({ri,li,score:bpGetScore(ri,li)});
    });
  });
  items.sort((a,b)=>a.score-b.score);
  return items;
}

function openDrill(){
  bpLoad();bpEnsure(currentPerson);
  drillQueue=buildDrillQueue();
  drillIdx=0;drillRevealed=false;
  document.getElementById('drillOverlay').style.display='flex';
  renderDrillCard();
}
function closeDrill(){
  document.getElementById('drillOverlay').style.display='none';
  renderTabs();renderLoci();renderDetail();updateDrillStats();
}
function renderDrillCard(){
  if(drillIdx>=drillQueue.length){
    document.getElementById('drillCardInner').innerHTML=`
      <div style="padding:40px;text-align:center;color:#f5f4f0;">
        <div style="font-size:48px;margin-bottom:16px;">🎉</div>
        <div style="font-family:Gloock,Georgia,serif;font-size:24px;margin-bottom:8px;">Alle Loci geübt!</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:24px;">Drill abgeschlossen.</div>
        <button class="exp-btn" onclick="closeDrill()" style="color:#a07840;border-color:#a07840;">Schliessen</button>
      </div>`;
    return;
  }
  drillRevealed=false;
  const {ri,li}=drillQueue[drillIdx];
  const room=rooms[ri];
  const locus=room.loci[li];
  const imgKey=ri+'_'+li;
  const imgUrl=locusImages[imgKey]||localStorage.getItem('bmp_img_'+imgKey)||'';
  const imgHtml=imgUrl
    ?`<img src="${imgUrl}" alt="" onerror="this.style.display='none'">`
    :`<div class="drill-img-placeholder">Kein Bild</div>`;
  const color=COLS[li];
  const score=bpGetScore(ri,li);
  const noteVal=bpGetNote(ri,li);

  document.getElementById('drillCardInner').innerHTML=`
    <div class="drill-progress-header">
      <span class="drill-counter">${drillIdx+1} / ${drillQueue.length}</span>
      <span class="drill-room-label">${room.name} · ${room.body}</span>
      <button class="drill-close-btn" onclick="closeDrill()">✕</button>
    </div>
    <div class="drill-img-wrap" style="height:180px;max-height:180px;overflow:hidden;">
      ${imgHtml}
      <div class="drill-num-badge" style="border-color:${color};color:${color};background:${color}22">${li+1}</div>
    </div>
    <div class="drill-body">
      <div class="drill-locus-name">${locus.n}</div>
      <div class="drill-locus-pos">${POS[li]} — ${POSDIR[li]}</div>
      <button class="drill-reveal-btn" id="drillRevealBtn" onclick="revealDrill()">
        Aufdecken <span style="opacity:0.5;font-size:12px">(Leertaste)</span>
      </button>
      <div class="drill-content" id="drillContent">
        <div class="drill-anchor">${locus.anchor}</div>
        <div class="drill-transform"><span class="tl">Person-Transformation</span>${locus.transform}</div>
        <span class="drill-rating-label">Wie gut hast du es gewusst?</span>
        <div class="drill-rating">
          <button class="rate-btn rate-btn-1" onclick="rateDrill(1)">1<br><span style="font-size:10px;font-weight:400">Gar nicht</span></button>
          <button class="rate-btn rate-btn-2" onclick="rateDrill(2)">2<br><span style="font-size:10px;font-weight:400">Kaum</span></button>
          <button class="rate-btn rate-btn-3" onclick="rateDrill(3)">3<br><span style="font-size:10px;font-weight:400">Halb</span></button>
          <button class="rate-btn rate-btn-4" onclick="rateDrill(4)">4<br><span style="font-size:10px;font-weight:400">Gut</span></button>
          <button class="rate-btn rate-btn-5" onclick="rateDrill(5)">5<br><span style="font-size:10px;font-weight:400">Perfekt</span></button>
        </div>
        <textarea class="drill-note-field" id="drillNoteField" placeholder="Notiz hinzufügen...">${noteVal}</textarea>
      </div>
      <div class="drill-nav-hint"><kbd>←</kbd> zurück &nbsp; <kbd>→</kbd> weiter &nbsp; <kbd>Leertaste</kbd> aufdecken</div>
    </div>`;
}

function revealDrill(){
  drillRevealed=true;
  const btn=document.getElementById('drillRevealBtn');
  const content=document.getElementById('drillContent');
  if(btn)btn.style.display='none';
  if(content)content.classList.add('open');
}

function rateDrill(score){
  const {ri,li}=drillQueue[drillIdx];
  // Save note if typed
  const noteField=document.getElementById('drillNoteField');
  if(noteField)bpSetNote(ri,li,noteField.value);
  bpSetScore(ri,li,score);
  drillIdx++;
  renderDrillCard();
}

function drillNav(dir){
  if(dir===1){
    // save note before advancing
    const noteField=document.getElementById('drillNoteField');
    const {ri,li}=drillQueue[drillIdx]||{};
    if(noteField&&ri!==undefined)bpSetNote(ri,li,noteField.value);
    drillIdx=Math.min(drillIdx+1,drillQueue.length);
    renderDrillCard();
  } else {
    drillIdx=Math.max(drillIdx-1,0);
    renderDrillCard();
  }
}

// ── KEYBOARD NAVIGATION ──
document.addEventListener('keydown',function(e){
  const drillOpen=document.getElementById('drillOverlay')&&document.getElementById('drillOverlay').style.display==='flex';
  const tag=document.activeElement.tagName.toLowerCase();
  const typing=(tag==='input'||tag==='textarea');

  if(drillOpen){
    if(e.key===' '&&!typing){e.preventDefault();if(!drillRevealed)revealDrill();}
    if(e.key==='ArrowRight'&&!typing){e.preventDefault();drillNav(1);}
    if(e.key==='ArrowLeft'&&!typing){e.preventDefault();drillNav(-1);}
    if(e.key==='1'&&drillRevealed&&!typing)rateDrill(1);
    if(e.key==='2'&&drillRevealed&&!typing)rateDrill(2);
    if(e.key==='3'&&drillRevealed&&!typing)rateDrill(3);
    if(e.key==='4'&&drillRevealed&&!typing)rateDrill(4);
    if(e.key==='5'&&drillRevealed&&!typing)rateDrill(5);
    if(e.key==='Escape')closeDrill();
    return;
  }
  if(typing)return;
  if(e.key==='ArrowRight'){
    e.preventDefault();
    if(activeLocus<rooms[activeRoom].loci.length-1){activeLocus++;renderLoci();renderDetail();}
    else if(activeRoom<rooms.length-1){activeRoom++;activeLocus=0;renderTabs();renderLoci();renderDetail();}
  }
  if(e.key==='ArrowLeft'){
    e.preventDefault();
    if(activeLocus>0){activeLocus--;renderLoci();renderDetail();}
    else if(activeRoom>0){activeRoom--;activeLocus=rooms[activeRoom].loci.length-1;renderTabs();renderLoci();renderDetail();}
  }
  if(e.key==='ArrowUp'){e.preventDefault();if(activeRoom>0){activeRoom--;activeLocus=0;renderTabs();renderLoci();renderDetail();}}
  if(e.key==='ArrowDown'){e.preventDefault();if(activeRoom<rooms.length-1){activeRoom++;activeLocus=0;renderTabs();renderLoci();renderDetail();}}
  if(e.key.toLowerCase()==='d'){openDrill();}
});
